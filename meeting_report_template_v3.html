<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>會議報告範本 v3 (保持比例)</title>
    <style>
        body {
            font-family: "Times New Roman", serif; /* 預設 Word 字體 */
            /* max-width: 210mm; */
            margin: 2cm; /* 大約 Word 預設邊距 */
        }
        h1, h2 {
            font-family: Arial, sans-serif; /* 常見 Word 標題字體 */
            font-weight: bold;
            color: black;
            border-bottom: 1px solid black;
            padding-bottom: 4pt;
            margin-top: 12pt;
            margin-bottom: 3pt;
        }
        h1 {
            font-size: 20pt;
            text-align: center;
            border-bottom-width: 1.5pt;
             padding-bottom: 8pt;
        }
        h2 {
            font-size: 16pt;
             border-bottom-width: 0.75pt;
        }
        p {
            font-family: "標楷體", serif; /* 中日韓字體範例 */
            font-size: 12pt;
            margin-bottom: 7.5pt;
            line-height: 1.5;
             white-space: pre-wrap; /* 保留摘要中的換行符 */
        }
        .info-section p {
             white-space: normal; /* Info 部分正常換行 */
             line-height: 1.2;
             margin-bottom: 3pt;
        }
        strong {
            font-weight: bold;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            border: 1px solid #ccc;
            margin-top: 10pt;
            margin-bottom: 10pt;
        }
        td {
            border: 1px solid #ccc;
            padding: 5pt;
            vertical-align: top; /* 頂部對齊內容 */
            text-align: center; /* 置中對齊行內/文字內容 */
            width: 50%; /* 兩個等寬的欄位 */
        }
        /* 圖片樣式 - 現在由內聯樣式覆蓋，但保留以供備用/清晰 */
        td img {
            display: block; /* margin auto 置中需要 */
            margin-left: auto;
            margin-right: auto;
            margin-bottom: 5pt; /* 在圖片下方添加一些空間 */
            /* height: 142pt; /* 大約 5公分 - 現在內聯設定 */
            /* width: auto;   /* 現在內聯設定 */
            max-width: 100%; /* 保留此項以防止溢出 */
        }

        /* 描述樣式 */
        .description {
            font-size: 10pt;
            color: #333;
            text-align: center;
            margin-top: 0; /* 如果有預設 margin，則移除 */
        }
        .section {
             margin-bottom: 18.75pt;
        }
    </style>
</head>
<body>

    <h1>[請在此處輸入會議主標題]</h1>

    <div class="section info-section">
        <h2>會議基本資訊</h2>
        <p><strong>會議主題：</strong> [請輸入會議主題]</p>
        <p><strong>會議地點：</strong> [請輸入會議地點]</p>
        <p><strong>會議日期：</strong> [請輸入會議日期，例如：2025年05月06日]</p>
        <p><strong>與會人員：</strong> [請輸入與會人員姓名，用逗號分隔]</p>
    </div>

    <div class="section">
        <h2>圖片記錄</h2>
        <table>
            <tr>
                <td>
                    <!-- 圖片高度固定為 5cm，寬度自動 -->
                    <img src="placeholder1.jpg" alt="圖片 1" style="height: 5cm; width: auto;">
                    <p class="description">[請在此處輸入圖片 1 的說明文字]</p>
                </td>
                <td>
                    <img src="placeholder2.jpg" alt="圖片 2" style="height: 5cm; width: auto;">
                    <p class="description">[請在此處輸入圖片 2 的說明文字]</p>
                </td>
            </tr>
             <tr>
                <td>
                    <img src="placeholder3.jpg" alt="圖片 3" style="height: 5cm; width: auto;">
                    <p class="description">[請在此處輸入圖片 3 的說明文字]</p>
                </td>
                <td>
                    <img src="placeholder4.jpg" alt="圖片 4" style="height: 5cm; width: auto;">
                    <p class="description">[請在此處輸入圖片 4 的說明文字]</p>
                </td>
            </tr>
        </table>
    </div>

    <div class="section">
        <h2>會議總結與待辦事項</h2>
        <p>[請在此處輸入詳細的會議總結、討論內容、決策事項以及後續的待辦事項。 您可以自由換行。]</p>
    </div>

</body>
</html>
